worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # ✅ PROD: 로그 최소화
  access_log off;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------
    # Security Headers (PROD)
    # -------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -------------------------
    # Health Check
    # -------------------------
    location = /health {
      access_log off;
      return 200 "OK";
    }

    # -------------------------
    # Main App (PROD)
    # -------------------------
    location / {
      try_files $uri $uri/ /index.html;
    }

    # -------------------------
    # OTA App (PROD)
    # -------------------------
    location /ota/ {
      alias /usr/share/nginx/html/ota/;
      try_files $uri $uri/ /ota/index.html;
    }

    # -------------------------
    # Robot App (PROD)
    # -------------------------
    location /robot/ {
      alias /usr/share/nginx/html/robot/;
      try_files $uri $uri/ /robot/index.html;
    }

    # -------------------------
    # TMS App
    # -------------------------
    location /tms/ {
      alias /usr/share/nginx/html/tms/;
      try_files $uri $uri/ /tms/index.html;
    }


    # -------------------------
    # CMS App
    # -------------------------
    location /cms/ {
      alias /usr/share/nginx/html/cms/;
      try_files $uri $uri/ /cms/index.html;
    }

    # -------------------------
    # Learning App (PROD)
    # -------------------------
    location /learning/ {
      alias /usr/share/nginx/html/learning/;
      try_files $uri $uri/ /learning/index.html;
    }

    # -------------------------
    # Static Assets (PROD: 장기 캐시)
    # -------------------------
    location ~* ^/(assets|ota/assets|robot/assets|cms/assets|learning/assets)/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # -------------------------
    # Error Pages
    # -------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
  }
}