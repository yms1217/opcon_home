worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # ✅ DEV: 상세 로그
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log debug;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------
    # Health Check
    # -------------------------
    location = /health {
      access_log off;
      return 200 "OK";
    }

    # -------------------------
    # Main App (DEV)
    # -------------------------
    location / {
      try_files $uri $uri/ /index.html;
    }

    # -------------------------
    # OTA App (DEV)
    # -------------------------
    location /ota/ {
      alias /usr/share/nginx/html/ota/;
      try_files $uri $uri/ /ota/index.html;
    }

    # -------------------------
    # Robot App (DEV)
    # -------------------------
    location /robot/ {
      alias /usr/share/nginx/html/robot/;
      try_files $uri $uri/ /robot/index.html;
    }

    # -------------------------
    # TMS App
    # -------------------------
    location /tms/ {
      alias /usr/share/nginx/html/tms/;
      try_files $uri $uri/ /tms/index.html;
    }

    # -------------------------
    # CMS App
    # -------------------------
    location /cms/ {
      alias /usr/share/nginx/html/cms/;
      try_files $uri $uri/ /cms/index.html;
    }

    # -------------------------
    # Learning App (DEV)
    # -------------------------
    location /learning/ {
      alias /usr/share/nginx/html/learning/;
      try_files $uri $uri/ /learning/index.html;
    }

    # -------------------------
    # Static Assets (DEV: 캐시 짧게)
    # -------------------------
    location ~* ^/(assets|ota/assets|robot/assets|cms/assets|learning/assets)/ {
      expires off;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
      try_files $uri =404;
    }

    # -------------------------
    # Error Pages
    # -------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
  }
}